version: '3.8'
services:
  db:
    image: postgres:18-alpine
    container_name: postgres-hexagonal
    environment:
      POSTGRES_USER: postgress
      POSTGRES_PASSWORD: postgress
      POSTGRES_DB: postgres-hexagonal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: